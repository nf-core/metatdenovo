name: "kofamscan_download"
description: Downloads KEGG Orthology (KO) data for KofamScan
keywords:
  - kofamscan
  - kegg
  - orthology
  - download
input:
  - none
output:
  - ko_list:
      type: file
      description: KEGG Orthology (KO) list file
      pattern: "ko_list"
  - koprofiles:
      type: directory
      description: Directory containing KEGG Orthology profiles
      pattern: "profiles"
topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - wget:
          type: string
          description: The name of the tool
      - wget --version 2>&1 | head -n 1 | awk "{print \$3}"
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@danilodileo"
